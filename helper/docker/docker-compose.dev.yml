name: shadowing

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: shadowspeak-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_GOOGLE_CLIENT_ID: ${KEYCLOAK_GOOGLE_CLIENT_ID:-replace-with-google-client-id}
      KEYCLOAK_GOOGLE_CLIENT_SECRET: ${KEYCLOAK_GOOGLE_CLIENT_SECRET:-replace-with-google-client-secret}
      KEYCLOAK_FACEBOOK_CLIENT_ID: ${KEYCLOAK_FACEBOOK_CLIENT_ID:-replace-with-facebook-client-id}
      KEYCLOAK_FACEBOOK_CLIENT_SECRET: ${KEYCLOAK_FACEBOOK_CLIENT_SECRET:-replace-with-facebook-client-secret}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/data/h2:/opt/keycloak/data/h2
      - ./keycloak/import:/opt/keycloak/data/import:ro

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: shadowspeak-dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    working_dir: /home/dynamodblocal
    ports:
      - "8000:8000"
    volumes:
      - ./dynamodb:/home/dynamodblocal/data
